version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: postgres_at
    environment:
      POSTGRES_DB: academia
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: 1234
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - at-network

  app:
    build: .
    container_name: spring_app_at
    ports:
      - "8080:8080"
    depends_on:
      - db
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://db:5432/academia
      SPRING_DATASOURCE_USERNAME: postgres
      SPRING_DATASOURCE_PASSWORD: 1234
    networks:
      - at-network

volumes:
  postgres_data:

networks:
  at-network:
    driver: bridge